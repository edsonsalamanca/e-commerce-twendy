<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Store - Loja de Produtos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 14px;
            background-color: #f9fafb;
            color: #111827;
            line-height: 1.5;
        }

        /* Header */
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo svg {
            width: 32px;
            height: 32px;
            color: #2563eb;
        }

        .header-logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
        }

        .header-count {
            font-size: 14px;
            color: #6b7280;
        }

        /* Layout Principal com Sidebar */
        .container-layout {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            padding: 24px;
        }

        /* Sidebar Style */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 15px;
            display: block;
        }

        /* Botão Categoria Estilo Buitanda */
        .btn-category {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subcategory-list {
            list-style: none;
            padding-left: 15px;
            margin-top: 8px;
        }

        .subcategory-list li {
            padding: 5px 0;
            color: #4b5563;
            cursor: pointer;
            transition: 0.2s;
        }

        .subcategory-list li:hover {
            color: #2563eb;
        }

        /* Checkbox Marcas */
        .brand-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        /* Slider de Preço */
        .price-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .price-inputs input {
            width: 100%;
            padding: 5px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }

        /* Estrelas de Avaliação */
        .rating-filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 0;
        }
        .stars-container {
            color: #fbbf24;
            font-size: 18px;
        }
        .star-off { color: #d1d5db; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
        }

        /* Search Bar */
        .search-filter {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
            padding: 16px;
            margin-bottom: 24px;
        }

        .filter-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 1024px) {
            .filter-container {
                flex-direction: row;
            }
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #9ca3af;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        /* Product Grid Adjustment */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        @media (min-width: 1400px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Manter estilos originais do Product Card */
        .product-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        .product-card:hover {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .product-image-container {
            width: 100%;
            padding-top: 100%;
            position: relative;
            overflow: hidden;
            background-color: #f3f4f6;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-info { padding: 16px; }
        .product-name { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 4px; }
        .product-description { font-size: 14px; color: #6b7280; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 12px; }
        .star-icon { width: 16px; height: 16px; fill: #fbbf24; color: #fbbf24; }
        .product-price { font-size: 20px; font-weight: 700; color: #111827; }
        .add-to-cart-btn { padding: 8px 16px; background-color: #2563eb; color: #ffffff; border: none; border-radius: 8px; cursor: pointer; }

        /* Estilo para esconder sidebar em mobile se desejar */
        @media (max-width: 768px) {
            .container-layout { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <h1>Product Store</h1>
            </div>
            <div class="header-count" id="productCount">12 products</div>
        </div>
    </header>

    <div class="container-layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <button class="btn-category">
                    Categorias <span>▼</span>
                </button>
                <ul class="subcategory-list">
                    <li onclick="setCategory('All')">Todos os Produtos</li>
                    <li onclick="setCategory('Audio')">Áudio & Som</li>
                    <li onclick="setCategory('Computers')">Computadores</li>
                    <li onclick="setCategory('Mobile')">Telemóveis</li>
                    <li onclick="setCategory('Wearables')">Acessórios Inteligentes</li>
                </ul>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-title">Marcas</span>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Apple"> Apple</label>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Samsung"> Samsung</label>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Sony"> Sony</label>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Logitech"> Logitech</label>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-title">Preço</span>
                <input type="range" id="priceRange" min="0" max="2000" value="2000" style="width:100%">
                <div class="price-inputs">
                    <span>$0</span>
                    <span id="priceValue" style="margin-left: auto; font-weight: bold;">$2000</span>
                </div>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-title">Avaliação</span>
                <div onclick="setRating(5)" class="rating-filter-item">
                    <div class="stars-container">★★★★★</div>
                </div>
                <div onclick="setRating(4)" class="rating-filter-item">
                    <div class="stars-container">★★★★<span class="star-off">★</span></div>
                </div>
                <div onclick="setRating(3)" class="rating-filter-item">
                    <div class="stars-container">★★★<span class="star-off">★★</span></div>
                </div>
                <div onclick="setRating(2)" class="rating-filter-item">
                    <div class="stars-container">★★<span class="star-off">★★★</span></div>
                </div>
                <div onclick="setRating(1)" class="rating-filter-item">
                    <div class="stars-container">★<span class="star-off">★★★★</span></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="search-filter">
                <div class="filter-container">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                        <input type="text" class="search-input" id="searchInput" placeholder="Pesquisar produtos...">
                    </div>
                    <div>
                        <select id="sortFilter">
                            <option value="name-asc">Nome (A-Z)</option>
                            <option value="name-desc">Nome (Z-A)</option>
                            <option value="price-asc">Preço (Menor para Maior)</option>
                            <option value="price-desc">Preço (Maior para Menor)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="product-grid" id="productGrid"></div>
        </main>
    </div>

    <script>
        const products = [
            { id: '1', name: 'Wireless Headphones Pro', price: 299.99, rating: 5, category: 'Audio', brand: 'Sony', image: 'https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=400' },
            { id: '2', name: 'Ultra Slim Laptop', price: 1299.99, rating: 4, category: 'Computers', brand: 'Apple', image: 'https://images.unsplash.com/photo-1759668358660-0d06064f0f84?w=400' },
            { id: '3', name: 'Smartphone X Pro', price: 999.99, rating: 4, category: 'Mobile', brand: 'Samsung', image: 'https://images.unsplash.com/photo-1646719223599-9864b351e242?w=400' },
            { id: '4', name: 'Fitness Smartwatch', price: 349.99, rating: 3, category: 'Wearables', brand: 'Apple', image: 'https://images.unsplash.com/photo-1665860455418-017fa50d29bc?w=400' },
            { id: '5', name: 'Professional DSLR', price: 1899.99, rating: 5, category: 'Cameras', brand: 'Sony', image: 'https://images.unsplash.com/photo-1532272278764-53cd1fe53f72?w=400' },
            { id: '6', name: 'Bluetooth Speaker', price: 129.99, rating: 4, category: 'Audio', brand: 'Logitech', image: 'https://images.unsplash.com/photo-1674303324806-7018a739ed11?w=400' },
            { id: '7', name: 'Gaming Keyboard', price: 159.99, rating: 5, category: 'Accessories', brand: 'Logitech', image: 'https://images.unsplash.com/photo-1656711081969-9d16ebc2d210?w=400' },
            { id: '8', name: 'Gaming Mouse', price: 79.99, rating: 4, category: 'Accessories', brand: 'Logitech', image: 'https://images.unsplash.com/photo-1760482280819-3212f185d50d?w=400' }
        ];

        let currentCategory = 'All';
        let minRating = 0;

        const searchInput = document.getElementById('searchInput');
        const sortFilter = document.getElementById('sortFilter');
        const productGrid = document.getElementById('productGrid');
        const productCount = document.getElementById('productCount');
        const priceRange = document.getElementById('priceRange');
        const priceValue = document.getElementById('priceValue');
        const brandCheckboxes = document.querySelectorAll('.brand-filter');

        function setCategory(cat) {
            currentCategory = cat;
            filterAndSortProducts();
        }

        function setRating(rate) {
            minRating = rate;
            filterAndSortProducts();
        }

        function filterAndSortProducts() {
            const searchQuery = searchInput.value.toLowerCase();
            const sortOption = sortFilter.value;
            const maxPrice = parseFloat(priceRange.value);
            priceValue.textContent = `$${maxPrice}`;

            const selectedBrands = Array.from(brandCheckboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.value);

            let filtered = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchQuery);
                const matchesCategory = currentCategory === 'All' || product.category === currentCategory;
                const matchesPrice = product.price <= maxPrice;
                const matchesRating = product.rating >= minRating;
                const matchesBrand = selectedBrands.length === 0 || selectedBrands.includes(product.brand);
                
                return matchesSearch && matchesCategory && matchesPrice && matchesRating && matchesBrand;
            });

            filtered.sort((a, b) => {
                if (sortOption === 'price-asc') return a.price - b.price;
                if (sortOption === 'price-desc') return b.price - a.price;
                if (sortOption === 'name-asc') return a.name.localeCompare(b.name);
                if (sortOption === 'name-desc') return b.name.localeCompare(a.name);
                return 0;
            });

            renderProducts(filtered);
            productCount.textContent = `${filtered.length} produtos encontrados`;
        }

        function renderProducts(productsToRender) {
            productGrid.innerHTML = productsToRender.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-rating">
                            ${'★'.repeat(product.rating)}${'☆'.repeat(5-product.rating)}
                            <span class="rating-value">${product.rating.toFixed(1)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span class="product-price">$${product.price.toFixed(2)}</span>
                            <button class="add-to-cart-btn" onclick="alert('Adicionado!')">Add</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', filterAndSortProducts);
        sortFilter.addEventListener('change', filterAndSortProducts);
        priceRange.addEventListener('input', filterAndSortProducts);
        brandCheckboxes.forEach(cb => cb.addEventListener('change', filterAndSortProducts));

        filterAndSortProducts();
    </script>
</body>
</html>
