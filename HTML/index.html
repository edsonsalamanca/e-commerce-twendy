<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Store - Loja de Produtos</title>
    <link rel="stylesheet" href="/fontawesome-free-6.7.2-web/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 14px; background-color: #f9fafb; color: #111827; line-height: 1.5;
        }

        .header {
            background-color: #ffffff; border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            position: sticky; top: 0; z-index: 100;
        }

        .header-container {
            max-width: 1400px; margin: 0 auto; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-logo { display: flex; align-items: center; gap: 12px; }
        .header-logo svg { width: 32px; height: 32px; color: #195ceb; }
        .header-logo h1 { font-size: 24px; font-weight: 700; color: #111827; }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        
        .cart-icon-wrapper { position: relative; cursor: pointer; padding: 5px; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px;
            background: #ef4444; color: white; font-size: 11px;
            padding: 2px 6px; border-radius: 50%; font-weight: bold;
        }
        .user-avatar i{ color: #111827; font-size: 35px; margin-top: -7px; }

        .cart-modal {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
            background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 1000; transition: 0.3s; display: flex; flex-direction: column;
        }
        .cart-modal.active { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-items-list { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-footer { padding: 20px; border-top: 2px solid #eee; }
        .checkout-btn { width: 100%; background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .container-layout { max-width: 1400px; margin: 0 auto; display: flex; gap: 24px; padding: 24px; }
        
        .sidebar { width: 280px; flex-shrink: 0; background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; height: fit-content; }
        .sidebar-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .sidebar-title { font-weight: 700; font-size: 16px; margin-bottom: 15px; display: block; }
        .btn-category { width: 100%; background: #195ceb; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .subcategory-list { list-style: none; padding-left: 15px; margin-top: 8px; }
        .subcategory-list li { padding: 5px 0; color: #4b5563; cursor: pointer; }
        .brand-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
        .stars-container { color: #fbbf24; font-size: 18px; cursor: pointer; }
        .star-off { color: #d1d5db; }

        .sidebar-close { display: none; font-size: 24px; font-weight: bold; text-align: right; cursor: pointer; margin-bottom: 15px; }

        .main-content { flex-grow: 1; }
        .search-filter { background-color: #ffffff; border-radius: 8px; border: 1px solid #e5e7eb; padding: 16px; margin-bottom: 24px; }
        .search-wrapper { position: relative; flex: 1; min-width: 200px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #9ca3af; }
        .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; }
        
        .mobile-filter-btn { display: none; padding: 10px 16px; background-color: #111827; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
        .product-card { background: white; border-radius: 8px; border: 1px solid #e5e7eb; overflow: hidden; }
        .product-image-container { width: 100%; padding-top: 100%; position: relative; background: #f3f4f6; }
        .product-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 16px; }
        .product-price { font-size: 20px; font-weight: 700; }
        .add-to-cart-btn { padding: 8px 16px; background-color: #195ceb; color: #ffffff; border: none; border-radius: 8px; cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }

        @media (max-width: 768px) {
            .header-container { flex-direction: row; padding: 12px 16px; }
            .header-logo h1 { font-size: 18px; display: none; } 
            .header-logo svg { width: 28px; height: 28px; }
            .user-avatar i { font-size: 28px; }
            
            .container-layout { flex-direction: column; padding: 16px; }
            
            .sidebar { 
                position: fixed; top: 0; left: -400px; width: 300px; height: 100%; 
                z-index: 1000; transition: 0.3s; overflow-y: auto; border-radius: 0; 
            }
            .sidebar.active { left: 0; }
            .sidebar-close { display: block; } 

            .mobile-filter-btn { display: block; }
            
            /* Melhoria do carrinho mobile para não ocupar toda a tela */
            .cart-modal { width: 85%; max-width: 320px; right: -100%; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeModals()"></div>

    <header class="header">
        <div class="header-container">
            <div class="header-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <h1>Product Store</h1>
            </div>
            
            <div class="header-actions">
                <div class="cart-icon-wrapper" onclick="toggleCart()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span id="cartBadge" class="cart-badge">0</span>
                </div>
                <div class="user-avatar"><i class="fa-solid fa-user-circle"></i></div>
            </div>
        </div>
    </header>

    <div id="cartModal" class="cart-modal">
        <div class="cart-header">
            <h3>Meu Carrinho</h3>
            <span onclick="closeModals()" style="cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div id="cartItemsList" class="cart-items-list"></div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
                <span>Total:</span> <span id="cartTotalText">$0.00</span>
            </div>
            <button class="checkout-btn">Finalizar Compra</button>
        </div>
    </div>

    <div class="container-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-close" onclick="toggleSidebar()">&times;</div>

            <div class="sidebar-section">
                <button class="btn-category">Categorias <span>▼</span></button>
                <ul class="subcategory-list">
                    <li onclick="setCategory('All'); toggleSidebarMobile();">Todos os Produtos</li>
                    <li onclick="setCategory('Audio'); toggleSidebarMobile();">Áudio & Som</li>
                    <li onclick="setCategory('Computers'); toggleSidebarMobile();">Computadores</li>
                    <li onclick="setCategory('Mobile'); toggleSidebarMobile();">Telemóveis</li>
                    <li onclick="setCategory('Wearables'); toggleSidebarMobile();">Acessórios Inteligentes</li>
                </ul>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-title">Marcas</span>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Apple"> Apple</label>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Samsung"> Samsung</label>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Sony"> Sony</label>
                <label class="brand-item"><input type="checkbox" class="brand-filter" value="Logitech"> Logitech</label>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-title">Preço</span>
                <input type="range" id="priceRange" min="0" max="2000" value="2000" style="width:100%">
                <div style="display:flex; justify-content:space-between; margin-top:5px;">
                    <span>$0</span> <span id="priceValue" style="font-weight:bold;">$2000</span>
                </div>
            </div>

            <div class="sidebar-section">
                <span class="sidebar-title">Avaliação</span>
                <div onclick="setRating(5); toggleSidebarMobile();" class="rating-filter-item">
                    <div class="stars-container">★★★★★</div>
                </div>
                <div onclick="setRating(4); toggleSidebarMobile();" class="rating-filter-item">
                    <div class="stars-container">★★★★<span class="star-off">★</span></div>
                </div>
                <div onclick="setRating(3); toggleSidebarMobile();" class="rating-filter-item">
                    <div class="stars-container">★★★<span class="star-off">★★</span></div>
                </div>
                <div onclick="setRating(2); toggleSidebarMobile();" class="rating-filter-item">
                    <div class="stars-container">★★<span class="star-off">★★★</span></div>
                </div>
                <div onclick="setRating(1); toggleSidebarMobile();" class="rating-filter-item">
                    <div class="stars-container">★<span class="star-off">★★★★</span></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="search-filter">
                <div style="display:flex; gap:16px; flex-wrap: wrap;">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                        <input type="text" class="search-input" id="searchInput" placeholder="Pesquisar produtos...">
                    </div>
                    <button class="mobile-filter-btn" onclick="toggleSidebar()">Filtros <i class="fa-solid fa-filter"></i></button>
                    <select id="sortFilter" style="padding:10px; border-radius:8px; flex: 1; min-width: 150px;">
                        <option value="name-asc">Nome (A-Z)</option>
                        <option value="price-asc">Menor Preço</option>
                    </select>
                </div>
            </div>

            <div class="product-grid" id="productGrid"></div>
        </main>
    </div>

    <script>
        const products = [
            { id: '1', name: 'Wireless Headphones Pro', price: 299.99, rating: 5, category: 'Audio', brand: 'Sony', image: 'https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=400' },
            { id: '2', name: 'Ultra Slim Laptop', price: 1299.99, rating: 4, category: 'Computers', brand: 'Apple', image: 'https://images.unsplash.com/photo-1759668358660-0d06064f0f84?w=400' },
            { id: '3', name: 'Smartphone X Pro', price: 999.99, rating: 4, category: 'Mobile', brand: 'Samsung', image: 'https://images.unsplash.com/photo-1646719223599-9864b351e242?w=400' },
            { id: '4', name: 'Fitness Smartwatch', price: 349.99, rating: 3, category: 'Wearables', brand: 'Apple', image: 'https://images.unsplash.com/photo-1665860455418-017fa50d29bc?w=400' },
            { id: '5', name: 'Professional DSLR', price: 1899.99, rating: 5, category: 'Cameras', brand: 'Sony', image: 'https://images.unsplash.com/photo-1532272278764-53cd1fe53f72?w=400' },
            { id: '6', name: 'Bluetooth Speaker', price: 129.99, rating: 2, category: 'Audio', brand: 'Logitech', image: 'https://images.unsplash.com/photo-1674303324806-7018a739ed11?w=400' },
            { id: '7', name: 'Gaming Keyboard', price: 159.99, rating: 1, category: 'Accessories', brand: 'Logitech', image: 'https://images.unsplash.com/photo-1656711081969-9d16ebc2d210?w=400' },
            { id: '8', name: 'Gaming Mouse', price: 79.99, rating: 4, category: 'Accessories', brand: 'Logitech', image: 'https://images.unsplash.com/photo-1760482280819-3212f185d50d?w=400' }
        ];

        let cart = [];
        let currentCategory = 'All';
        let minRating = 0;

        function closeModals() {
            document.getElementById('cartModal').classList.remove('active');
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        function toggleCart() {
            const m = document.getElementById('cartModal');
            const o = document.getElementById('overlay');
            m.classList.toggle('active');
            if(m.classList.contains('active')) {
                document.getElementById('sidebar').classList.remove('active');
                o.style.display = 'block';
            } else {
                o.style.display = 'none';
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            sb.classList.toggle('active');
            if(sb.classList.contains('active')) {
                document.getElementById('cartModal').classList.remove('active');
                o.style.display = 'block';
            } else {
                o.style.display = 'none';
            }
        }

        function toggleSidebarMobile() {
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if(inCart) inCart.qty++;
            else cart.push({...p, qty: 1});
            updateUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(x => x.id !== id);
            updateUI();
        }

        function updateUI() {
            document.getElementById('cartBadge').innerText = cart.reduce((a, b) => a + b.qty, 0);
            const list = document.getElementById('cartItemsList');
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>${item.qty}x $${item.price.toFixed(2)}</small>
                    </div>
                    <button onclick="removeFromCart('${item.id}')" style="color:red; border:none; background:none; cursor:pointer">Remover</button>
                </div>
            `).join('');
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('cartTotalText').innerText = `$${total.toFixed(2)}`;
        }

        function setCategory(cat) { currentCategory = cat; filterAndSortProducts(); }
        function setRating(rate) { minRating = rate; filterAndSortProducts(); }

        function filterAndSortProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const maxP = parseFloat(document.getElementById('priceRange').value);
            document.getElementById('priceValue').textContent = `$${maxP}`;
            
            const selectedBrands = Array.from(document.querySelectorAll('.brand-filter:checked')).map(cb => cb.value);

            let filtered = products.filter(p => {
                return p.name.toLowerCase().includes(query) && 
                       (currentCategory === 'All' || p.category === currentCategory) &&
                       p.price <= maxP && p.rating >= minRating &&
                       (selectedBrands.length === 0 || selectedBrands.includes(p.brand));
            });

            renderProducts(filtered);
        }

        function renderProducts(list) {
            document.getElementById('productGrid').innerHTML = list.map(p => `
                <div class="product-card">
                    <div class="product-image-container"><img src="${p.image}" class="product-image"></div>
                    <div class="product-info">
                        <h3 class="product-name">${p.name}</h3>
                        <div class="stars-container">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>
                        <div style="display:grid; align-items:center; margin-top:10px;">
                            <span class="product-price">$${p.price.toFixed(2)}</span>
                            <button class="add-to-cart-btn" onclick="addToCart('${p.id}')">Adicionar ao carrinho</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', filterAndSortProducts);
        document.getElementById('priceRange').addEventListener('input', filterAndSortProducts);
        document.querySelectorAll('.brand-filter').forEach(cb => cb.addEventListener('change', filterAndSortProducts));

        filterAndSortProducts();
    </script>
</body>
</html>
